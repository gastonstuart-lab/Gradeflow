<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Professional workflow operating system for teachers.">
  <meta name="theme-color" content="#050912">
  <meta name="color-scheme" content="dark">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="InstructOS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <!-- Google Sign-In (optional but recommended for Flutter web) -->
  <!-- Set this to your OAuth Web client ID from Google Cloud Console -->
  <meta name="google-signin-client_id" content="851087972500-06hut292tqfb86o9jmfo55tc441de78.apps.googleusercontent.com">

  <title>InstructOS</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: dark;
      --gf-bg: #050912;
      --gf-bg-soft: #090b16;
      --gf-text: #f5f7fb;
      --gf-muted: rgba(245, 247, 251, 0.72);
      --gf-accent: #8b5cf6;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 24% 38%, rgba(255, 62, 165, 0.16), transparent 32%),
        radial-gradient(circle at 72% 52%, rgba(34, 211, 238, 0.13), transparent 34%),
        radial-gradient(circle at 50% 88%, rgba(139, 92, 246, 0.14), transparent 38%),
        linear-gradient(140deg, #050711 0%, #0a1023 56%, var(--gf-bg-soft) 100%);
      color: var(--gf-text);
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", "SF Pro Display", system-ui, sans-serif;
    }

    body.gradeflow-ready {
      overflow: auto;
    }

    #gradeflow-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 24% 38%, rgba(255, 62, 165, 0.16), transparent 32%),
        radial-gradient(circle at 72% 52%, rgba(34, 211, 238, 0.13), transparent 34%),
        radial-gradient(circle at 50% 88%, rgba(139, 92, 246, 0.14), transparent 38%),
        linear-gradient(140deg, #050711 0%, #0a1023 56%, var(--gf-bg-soft) 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity 360ms ease, visibility 360ms ease;
      z-index: 9999;
    }

    #gradeflow-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .gf-loader-shell {
      position: relative;
      width: min(100%, 430px);
      text-align: center;
    }

    .gf-loader-head {
      display: grid;
      justify-items: center;
      gap: 6px;
    }

    .gf-loader-title {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 1.65rem);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 1.1;
    }

    .gf-loader-copy {
      margin: 0 auto;
      color: var(--gf-muted);
      line-height: 1.4;
      font-size: 0.95rem;
      font-weight: 600;
    }

    .gf-loader-dot {
      width: 7px;
      height: 7px;
      margin: 24px auto 0;
      border-radius: 999px;
      background: rgba(184, 195, 255, 0.9);
      box-shadow: 0 0 18px rgba(139, 92, 246, 0.42);
      animation: instructos-pulse 1.5s ease-in-out infinite alternate;
    }

    @keyframes instructos-pulse {
      from {
        opacity: 0.36;
        transform: scale(0.86);
      }
      to {
        opacity: 0.88;
        transform: scale(1);
      }
    }
  </style>
</head>
<body>
  <div id="gradeflow-loader" aria-hidden="true">
    <div class="gf-loader-shell">
      <div class="gf-loader-head">
        <h1 class="gf-loader-title">InstructOS</h1>
        <p class="gf-loader-copy">Teaching, organised.</p>
      </div>
      <div class="gf-loader-dot"></div>
    </div>
  </div>
  <script>
    (function () {
      const loader = document.getElementById('gradeflow-loader');
      let removed = false;

      function removeLoader() {
        if (!loader || removed) {
          return;
        }
        removed = true;
        document.body.classList.add('gradeflow-ready');
        loader.classList.add('is-hidden');
        window.setTimeout(() => loader.remove(), 420);
      }

      window.addEventListener('flutter-first-frame', removeLoader);
      window.addEventListener('load', () => {
        window.setTimeout(() => {
          if (!removed) {
            loader?.classList.remove('is-hidden');
          }
        }, 0);
      });

      const flutterViewCheck = window.setInterval(() => {
        if (document.querySelector('flt-glass-pane, flutter-view')) {
          window.clearInterval(flutterViewCheck);
          removeLoader();
        }
      }, 500);

    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
