<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="One system. Every classroom workflow.">
  <meta name="theme-color" content="#050912">
  <meta name="color-scheme" content="dark">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="InstructOS">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/assets/branding/instructos/instructos_favicon.svg"/>
  <link rel="alternate icon" type="image/png" href="favicon.png"/>

  <!-- Google Sign-In (optional but recommended for Flutter web) -->
  <!-- Set this to your OAuth Web client ID from Google Cloud Console -->
  <meta name="google-signin-client_id" content="851087972500-06hut292tqfb86o9jmfo55tc441de78.apps.googleusercontent.com">

  <title>InstructOS</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: dark;
      --gf-bg: #050912;
      --gf-bg-soft: #101a28;
      --gf-text: #f5f7fb;
      --gf-muted: rgba(245, 247, 251, 0.72);
      --gf-accent: #5c88ff;
      --gf-cyan: #46c6e9;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at top right, rgba(92, 136, 255, 0.18), transparent 34%),
        radial-gradient(circle at bottom left, rgba(70, 198, 233, 0.12), transparent 36%),
        linear-gradient(140deg, #050912 0%, #071019 54%, var(--gf-bg-soft) 100%);
      color: var(--gf-text);
    }

    body {
      overflow: hidden;
      font-family: "Segoe UI", "SF Pro Display", system-ui, sans-serif;
    }

    body.gradeflow-ready {
      overflow: auto;
    }

    #gradeflow-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top right, rgba(92, 136, 255, 0.20), transparent 34%),
        radial-gradient(circle at bottom left, rgba(70, 198, 233, 0.14), transparent 40%),
        linear-gradient(140deg, #050912 0%, #071019 52%, var(--gf-bg-soft) 100%);
      opacity: 1;
      visibility: visible;
      transition: opacity 360ms ease, visibility 360ms ease;
      z-index: 9999;
    }

    #gradeflow-loader.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .gf-loader-shell {
      width: min(100%, 460px);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 14px;
    }

    .gf-loader-title {
      margin: 0;
      font-size: clamp(2rem, 4.2vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .gf-loader-title-accent {
      color: transparent;
      background-image: linear-gradient(90deg, var(--gf-accent), var(--gf-cyan));
      background-clip: text;
      -webkit-background-clip: text;
    }

    .gf-loader-tagline {
      margin: 0;
      color: var(--gf-muted);
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .gf-loader-progress {
      position: relative;
      width: min(100%, 280px);
      height: 2px;
      margin-top: 6px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .gf-loader-progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 44%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--gf-accent), var(--gf-cyan));
      box-shadow: 0 0 18px rgba(92, 136, 255, 0.28);
      animation: gradeflow-loader 1.35s ease-in-out infinite;
    }

    .gf-loader-status {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 2px;
      color: var(--gf-muted);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .gf-loader-status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gf-cyan);
      box-shadow: 0 0 18px rgba(70, 198, 233, 0.5);
      animation: gradeflow-pulse 1.6s ease-in-out infinite;
    }

    @keyframes gradeflow-loader {
      0% {
        transform: translateX(-115%);
      }
      50% {
        transform: translateX(120%);
      }
      100% {
        transform: translateX(240%);
      }
    }

    @keyframes gradeflow-pulse {
      0%,
      100% {
        opacity: 0.5;
        transform: scale(0.92);
      }
      50% {
        opacity: 1;
        transform: scale(1.08);
      }
    }

    @media (max-width: 640px) {
      .gf-loader-shell {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="gradeflow-loader" aria-hidden="true">
    <div class="gf-loader-shell">
      <h1 class="gf-loader-title">I/<span class="gf-loader-title-accent">OS</span> InstructOS</h1>
      <p class="gf-loader-tagline">One system. Every classroom workflow.</p>
      <div class="gf-loader-progress"></div>
      <div class="gf-loader-status">
        <span class="gf-loader-status-dot"></span>
        Preparing your classroom workspace...
      </div>
    </div>
  </div>
  <script>
    (function () {
      const loader = document.getElementById('gradeflow-loader');
      const status = loader?.querySelector('.gf-loader-status');
      let removed = false;

      function removeLoader() {
        if (!loader || removed) {
          return;
        }
        removed = true;
        document.body.classList.add('gradeflow-ready');
        loader.classList.add('is-hidden');
        window.setTimeout(() => loader.remove(), 420);
      }

      window.addEventListener('flutter-first-frame', removeLoader);
      window.addEventListener('load', () => {
        window.setTimeout(() => {
          if (!removed) {
            loader?.classList.remove('is-hidden');
          }
        }, 0);
      });

      const flutterViewCheck = window.setInterval(() => {
        if (document.querySelector('flt-glass-pane, flutter-view')) {
          window.clearInterval(flutterViewCheck);
          removeLoader();
        }
      }, 500);

      window.setTimeout(() => {
        if (!removed && status) {
          status.lastChild.textContent = ' Still preparing your classroom workspace...';
        }
      }, 45000);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
